<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sareekraft Form</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a; /* Slate 900 */
            --primary-hover: #334155; /* Slate 700 */
            --bg-color: #f8fafc; /* Slate 50 */
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --border-focus: #94a3b8;
            --ring: rgba(148, 163, 184, 0.25);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .form-container {
            background-color: var(--surface);
            width: 100%;
            max-width: 460px;
            padding: 48px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .header {
            text-align: center;
            margin-bottom: 36px;
        }

        .header h2 {
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 15px;
            color: var(--text-muted);
        }

        .input-group {
            margin-bottom: 22px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 13.5px;
            font-weight: 500;
            color: var(--text-main);
            margin-left: 2px;
        }

        .input-group input, 
        .input-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            background-color: #fafafa;
            color: var(--text-main);
            transition: all 0.2s ease;
        }

        .input-group textarea {
            resize: vertical;
            min-height: 110px;
        }

        .input-group input::placeholder,
        .input-group textarea::placeholder {
            color: #94a3b8;
            font-weight: 400;
        }

        .input-group input:focus,
        .input-group textarea:focus {
            outline: none;
            border-color: var(--border-focus);
            background-color: var(--surface);
            box-shadow: 0 0 0 4px var(--ring);
        }

        button[type="submit"] {
            width: 100%;
            padding: 16px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15.5px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 12px;
            letter-spacing: 0.2px;
        }

        button[type="submit"]:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        button[type="submit"]:active {
            transform: translateY(0);
            box-shadow: none;
        }

        .alert {
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 14.5px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .alert-error {
            background-color: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }

        .alert-success {
            background-color: #f0fdf4;
            color: #15803d;
            border: 1px solid #bbf7d0;
        }

        /* Responsive adjustments */
        @media (max-width: 520px) {
            .form-container {
                padding: 32px 24px;
                border-radius: 16px;
            }
            body {
                padding: 16px;
            }
            .header h2 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="header">
            <h2>Sareekraft</h2>
            <p>Please fill out the details below</p>
        </div>

        {% if error %}
        <div class="alert alert-error">
            {{ error }}
        </div>
        {% endif %}

        {% if success %}
        <div class="alert alert-success">
            {{ success }}
        </div>
        {% endif %}

        <form method="POST">
            <div class="input-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="John Doe" value="{{ form.get('name', '') if form else '' }}" required>
            </div>
            
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="john@example.com" value="{{ form.get('email', '') if form else '' }}" required>
            </div>
            
            <div class="input-group">
                <label for="phone-number">Phone Number</label>
                <input type="tel" name="phone-number" id="phone-number" placeholder="+1 (555) 000-0000" value="{{ form.get('phone-number', '') if form else '' }}" required>
            </div>

            <div class="input-group">
                <label for="city">City</label>
                <input type="text" name="city" id="city" placeholder="Mumbai" value="{{ form.get('city', '') if form else '' }}" required>
            </div>
            
            <div class="input-group">
                <label for="feedback">Feedback</label>
                <textarea name="feedback" id="feedback" placeholder="We'd love to hear your thoughts..." required>{{ form.get('feedback', '') if form else '' }}</textarea>
            </div>
            
            <button type="submit">Submit Details</button>
        </form>
    </div>

</body>
</html>
